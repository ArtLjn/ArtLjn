<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="40%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2F81F7"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;0%;100%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#ffffff"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;0%;100%" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- Animated particles -->
  <g opacity="0.6">
    <circle cx="120" cy="80" r="2" fill="#2F81F7">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="80" r="6" fill="#2F81F7" opacity="0.1">
      <animate attributeName="r" values="5;8;5" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.05;0.15;0.05" dur="3s" repeatCount="indefinite"/>
    </circle>

    <circle cx="350" cy="45" r="1.5" fill="#a855f7">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="4s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="350" cy="45" r="5" fill="#a855f7" opacity="0.08">
      <animate attributeName="r" values="4;7;4" dur="4s" repeatCount="indefinite" begin="0.5s"/>
    </circle>

    <circle cx="980" cy="65" r="2.5" fill="#2F81F7">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="980" cy="65" r="7" fill="#2F81F7" opacity="0.1">
      <animate attributeName="r" values="6;10;6" dur="2.5s" repeatCount="indefinite" begin="1s"/>
    </circle>

    <circle cx="1050" cy="280" r="1.5" fill="#a855f7">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.5s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle cx="1050" cy="280" r="5" fill="#a855f7" opacity="0.08">
      <animate attributeName="r" values="4;7;4" dur="3.5s" repeatCount="indefinite" begin="1.5s"/>
    </circle>

    <circle cx="200" cy="300" r="2" fill="#2F81F7">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4.5s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="750" cy="30" r="1.8" fill="#60a5fa">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="550" cy="310" r="2" fill="#a855f7">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="900" cy="160" r="1.5" fill="#2F81F7">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.8s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="150" cy="180" r="1.2" fill="#a855f7">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4.2s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <circle cx="680" cy="85" r="1" fill="#60a5fa">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="5.5s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="420" cy="290" r="1.3" fill="#2F81F7">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite" begin="2.2s"/>
    </circle>
    <circle cx="1100" cy="140" r="1.8" fill="#a855f7">
      <animate attributeName="opacity" values="0.15;0.55;0.15" dur="3.2s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
  </g>

  <!-- Connecting lines with dash animation -->
  <g stroke-width="0.5" fill="none">
    <line x1="120" y1="80" x2="350" y2="45" stroke="#2F81F7" opacity="0.15">
      <animate attributeName="stroke-dashoffset" from="300" to="0" dur="2s" fill="freeze"/>
      <animate attributeName="opacity" values="0;0.15;0.15" dur="2s" fill="freeze"/>
    </line>
    <line x1="350" y1="45" x2="680" y2="85" stroke="#a855f7" opacity="0.12">
      <animate attributeName="stroke-dashoffset" from="350" to="0" dur="2.5s" fill="freeze" begin="0.5s"/>
      <animate attributeName="opacity" values="0;0.12;0.12" dur="2.5s" fill="freeze" begin="0.5s"/>
    </line>
    <line x1="680" y1="85" x2="980" y2="65" stroke="#2F81F7" opacity="0.15">
      <animate attributeName="stroke-dashoffset" from="320" to="0" dur="2s" fill="freeze" begin="1s"/>
      <animate attributeName="opacity" values="0;0.15;0.15" dur="2s" fill="freeze" begin="1s"/>
    </line>
    <line x1="980" y1="65" x2="1100" y2="140" stroke="#a855f7" opacity="0.12">
      <animate attributeName="stroke-dashoffset" from="150" to="0" dur="1.5s" fill="freeze" begin="1.5s"/>
      <animate attributeName="opacity" values="0;0.12;0.12" dur="1.5s" fill="freeze" begin="1.5s"/>
    </line>
    <line x1="200" y1="300" x2="420" y2="290" stroke="#2F81F7" opacity="0.12">
      <animate attributeName="stroke-dashoffset" from="230" to="0" dur="1.8s" fill="freeze" begin="0.8s"/>
      <animate attributeName="opacity" values="0;0.12;0.12" dur="1.8s" fill="freeze" begin="0.8s"/>
    </line>
    <line x1="420" y1="290" x2="550" y2="310" stroke="#a855f7" opacity="0.1">
      <animate attributeName="stroke-dashoffset" from="140" to="0" dur="1.5s" fill="freeze" begin="1.3s"/>
      <animate attributeName="opacity" values="0;0.1;0.1" dur="1.5s" fill="freeze" begin="1.3s"/>
    </line>
    <line x1="550" y1="310" x2="1050" y2="280" stroke="#2F81F7" opacity="0.12">
      <animate attributeName="stroke-dashoffset" from="520" to="0" dur="3s" fill="freeze" begin="1.8s"/>
      <animate attributeName="opacity" values="0;0.12;0.12" dur="3s" fill="freeze" begin="1.8s"/>
    </line>
    <line x1="150" y1="180" x2="120" y2="80" stroke="#a855f7" opacity="0.1">
      <animate attributeName="stroke-dashoffset" from="110" to="0" dur="1.2s" fill="freeze" begin="0.3s"/>
      <animate attributeName="opacity" values="0;0.1;0.1" dur="1.2s" fill="freeze" begin="0.3s"/>
    </line>
    <line x1="900" y1="160" x2="980" y2="65" stroke="#2F81F7" opacity="0.08">
      <animate attributeName="stroke-dashoffset" from="110" to="0" dur="1.5s" fill="freeze" begin="1.6s"/>
      <animate attributeName="opacity" values="0;0.08;0.08" dur="1.5s" fill="freeze" begin="1.6s"/>
    </line>
  </g>

  <!-- Floating horizontal scan line -->
  <rect x="0" y="0" width="1200" height="1" fill="#2F81F7" opacity="0.06">
    <animate attributeName="y" values="0;340;0" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.06;0;0.06;0" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Main text group with fade-in -->
  <g>
    <animate attributeName="opacity" values="0;1" dur="1.5s" fill="freeze"/>

    <!-- Subtle blue glow behind name -->
    <ellipse cx="600" cy="145" rx="200" ry="40" fill="#2F81F7" opacity="0.04" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0.02;0.06;0.02" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="rx" values="180;220;180" dur="4s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Name "ArtLjn" -->
    <text x="600" y="160" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="url(#textGrad)">
      ArtLjn
    </text>

    <!-- Thin separator line (draws itself) -->
    <line x1="570" y1="190" x2="630" y2="190" stroke="#2F81F7" stroke-width="1" opacity="0.4" stroke-dasharray="60" stroke-dashoffset="60">
      <animate attributeName="stroke-dashoffset" from="60" to="0" dur="1s" fill="freeze" begin="1s"/>
    </line>

    <!-- Tagline -->
    <text x="600" y="222" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="17" font-weight="400" letter-spacing="3" fill="#8b949e" opacity="0">
      Agent Developer · Full-stack Engineer
      <animate attributeName="opacity" values="0;0;1" dur="0.8s" fill="freeze" begin="1.2s"/>
    </text>
  </g>

  <!-- Bottom accent line with gradient shift -->
  <rect x="0" y="337" width="1200" height="3" fill="url(#accent)"/>
</svg>
